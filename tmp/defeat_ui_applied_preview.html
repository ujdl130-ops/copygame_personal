<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applied Defeat UI Preview</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: #070914;
    }

    .preview-frame {
      position: relative;
      width: min(100vw - 48px, 960px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        url("../assets/maps/stage1/stage1_forest_bg_v2.png") center / cover no-repeat,
        #111827;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.55);
    }

    .stage-defeat-overlay {
      display: flex;
    }
  </style>
</head>
<body>
  <main class="preview-frame">
    <div id="stageDefeatOverlay" class="stage-defeat-overlay" role="dialog" aria-modal="true" aria-label="스테이지 실패 UI">
      <div class="stage-defeat-embers" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="stage-defeat-crest" aria-hidden="true">
        <img src="../assets/maps/stage1/player_castle_stage1.png" alt="" draggable="false">
      </div>
      <section class="stage-defeat-wrap" aria-label="패배 UI">
        <div class="stage-defeat-title-ribbon">
          <div class="stage-defeat-title-text">DEFEAT</div>
          <div class="stage-defeat-ornament" aria-hidden="true"></div>
        </div>
        <p class="stage-defeat-copy">성이 함락되었습니다</p>
        <div class="stage-defeat-actions" aria-label="스테이지 실패 행동">
          <button id="stageDefeatLobbyBtn" class="stage-defeat-action stage-defeat-lobby" type="button">로비</button>
          <button id="stageDefeatRetryBtn" class="stage-defeat-action stage-defeat-retry" type="button">재시작</button>
          <button id="stageDefeatUpgradeBtn" class="stage-defeat-action stage-defeat-upgrade" type="button">강화</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
