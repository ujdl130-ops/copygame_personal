<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stage Defeat UI Preview</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: #070914;
    }

    .preview-frame {
      position: relative;
      width: min(100vw - 48px, 960px);
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background:
        linear-gradient(rgba(9, 8, 16, 0.42), rgba(9, 8, 16, 0.56)),
        url("../assets/maps/stage1/stage1_forest_bg_v2.png") center / cover no-repeat,
        #17131f;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.55);
    }

    .stage-defeat-overlay {
      display: flex;
    }
  </style>
</head>
<body>
  <main class="preview-frame">
    <div id="stageDefeatOverlay" class="stage-defeat-overlay" role="dialog" aria-modal="true" aria-label="스테이지 실패 UI">
      <div class="stage-defeat-window">
        <div class="stage-defeat-cracks" aria-hidden="true"></div>
        <div class="stage-defeat-banner">
          <span>STAGE FAILED</span>
          <strong>스테이지 실패</strong>
        </div>
        <div class="stage-defeat-body">
          <div class="stage-defeat-emblem" aria-hidden="true">
            <img src="../assets/maps/stage1/player_castle_stage1.png" alt="" draggable="false">
            <span class="stage-defeat-break break-a"></span>
            <span class="stage-defeat-break break-b"></span>
            <span class="stage-defeat-flame flame-a"></span>
            <span class="stage-defeat-flame flame-b"></span>
          </div>
          <p class="stage-defeat-copy">성이 함락되었습니다</p>
          <small class="stage-defeat-subcopy">진형을 재정비하고 다시 도전하세요</small>
        </div>
        <div class="stage-defeat-actions" aria-label="스테이지 실패 행동">
          <button id="stageDefeatLobbyBtn" class="stage-defeat-action stage-defeat-lobby" type="button">로비</button>
          <button id="stageDefeatRetryBtn" class="stage-defeat-action stage-defeat-retry" type="button">다시하기</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
